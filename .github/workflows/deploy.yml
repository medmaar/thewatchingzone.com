name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy . --project-name=thewatchingzone --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}

      - name: Add custom domain
        run: |
          ACCOUNT_ID="${{ secrets.ACCOUNT_ID }}"
          CF_TOKEN="${{ secrets.CF_TOKEN }}"

          # Add thewatchingzone.com domain to the Pages project
          RESULT=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/pages/projects/thewatchingzone/domains" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"thewatchingzone.com"}')
          echo "$RESULT" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          if d.get('success'):
              print('✅ Domain thewatchingzone.com added to Pages project')
          else:
              err = d.get('errors', [{}])
              msg = err[0].get('message','') if err else ''
              if 'already' in msg.lower():
                  print('✅ Domain already connected')
              else:
                  print('Domain note:', msg or d)
          "

          # Add www subdomain too
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/pages/projects/thewatchingzone/domains" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"www.thewatchingzone.com"}' | python3 -c "
          import sys,json; d=json.load(sys.stdin)
          print('www:', 'added' if d.get('success') else d.get('errors',['already set'])[0].get('message','done'))
          "
