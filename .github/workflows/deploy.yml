name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Get Cloudflare Account ID
        id: cf
        run: |
          ACCOUNT_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.CF_TOKEN }}" \
            "https://api.cloudflare.com/client/v4/accounts" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'])")
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "✅ Account ID resolved"

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy . --project-name=thewatchingzone --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.cf.outputs.account_id }}

      - name: Connect custom domain
        run: |
          ACCOUNT_ID="${{ steps.cf.outputs.account_id }}"
          CF_TOKEN="${{ secrets.CF_TOKEN }}"

          for DOMAIN in "thewatchingzone.com" "www.thewatchingzone.com"; do
            RESULT=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/pages/projects/thewatchingzone/domains" \
              -H "Authorization: Bearer ${CF_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"${DOMAIN}\"}")
            echo "$RESULT" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          if d.get('success'):
              print('✅ Connected: $DOMAIN')
          else:
              msg = d.get('errors',[{}])[0].get('message','')
              print('ℹ️  $DOMAIN:', msg if msg else d)
          "
          done
