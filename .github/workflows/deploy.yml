name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Get Cloudflare Account ID
        id: cf
        run: |
          ACCOUNT_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.CF_TOKEN }}" \
            "https://api.cloudflare.com/client/v4/accounts" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'])")
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "✅ Account: $ACCOUNT_ID"

      - name: Create Pages project if not exists
        run: |
          RESULT=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${{ steps.cf.outputs.account_id }}/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CF_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"thewatchingzone","production_branch":"main"}')
          echo "$RESULT" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          if d.get('success'):
              print('✅ Project created')
          else:
              msg = d.get('errors',[{}])[0].get('message','')
              print('ℹ️ ', msg if msg else str(d))
          "

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_TOKEN }}
          accountId: ${{ steps.cf.outputs.account_id }}
          projectName: thewatchingzone
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main

      - name: Connect custom domain
        run: |
          for DOMAIN in "thewatchingzone.com" "www.thewatchingzone.com"; do
            RESULT=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${{ steps.cf.outputs.account_id }}/pages/projects/thewatchingzone/domains" \
              -H "Authorization: Bearer ${{ secrets.CF_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"${DOMAIN}\"}")
            echo "$RESULT" | python3 -c "
          import sys,json,os
          d=json.load(sys.stdin)
          dom=os.environ.get('DOMAIN','')
          if d.get('success'):
              print(f'✅ Connected: {dom}')
          else:
              msg=d.get('errors',[{}])[0].get('message','')
              print(f'ℹ️  {dom}:', msg if msg else str(d))
          " DOMAIN="$DOMAIN"
          done
